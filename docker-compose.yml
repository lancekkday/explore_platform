services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    env_file: ./.env
    volumes:
      # Persist SQLite DB, keywords, feedback, and destination data across restarts
      - ./backend/data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/keywords"]
      interval: 15s
      timeout: 5s
      retries: 3

  frontend:
    build: ./frontend
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
