services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: sip_backend
    restart: always
    env_file:
      - ./.env
    volumes:
      - sip_data:/app/data
    ports:
      - "${BACKEND_PORT:-8000}:8000"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: sip_frontend
    restart: always
    ports:
      - "${FRONTEND_PORT:-80}:80"
    depends_on:
      - backend

volumes:
  sip_data:
